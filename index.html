<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autenticação</title>
    <link rel="stylesheet" href="css/style.css">
        <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="EspetosApp">
    <link rel="apple-touch-icon" href="icone-192.png">

    <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('🚀 Aplicativo registrado com sucesso!', reg))
            .catch(err => console.log('❌ Erro ao registrar aplicativo', err));
        });
    }
</script>
</head>
<body>
    <div id="form">
        <label for="login">Login:</label>
        <input type="text" name="login" id="login">
        <label for="senha">Senha:</label>
        <input type="password" name="senha" id="senha">
        <button id="btnAcessar">Acessar Sistema</button>
    </div>
    <script type="module" src="server/login.js"></script>
    
</body>
</html>
