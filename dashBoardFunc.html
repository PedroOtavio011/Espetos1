<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Funcionário</title>
    <link rel="stylesheet" href="css/dashBoardFunc.css">
</head>
<body>
    <main>
        <header>
            <h1>Dashboard Funcionário</h1>
        </header>
        
        <label for="func">Funcionário:</label>
        <select id="func" name="func">
            <option value="">Escolha um funcionário:</option>
            <option value="João">João (Churrasqueiro)</option>
            <option value="Maria">Maria (Caixa)</option>
            <option value="Pedro">Pedro (Atendente)</option>
        </select>
        
        <label for="produtoFunc">Produto:</label>
        <select name="produto" id="produtoFunc">
            <option value="">Selecione o produto</option>
        </select>
        
        <label for="quantidade">Quantidade:</label>
        <input type="number" id="quantidade" min="1" value="1">
        
        <button id="btnConfirmarInterno">Confirmar</button>

        <div style="margin-top: 30px; border-top: 1px solid #444; padding-top: 20px;">
    <h2 style="color: #ff9800; font-size: 1.2rem; margin-bottom: 15px;">📊 Relatório de Custos (Consumo)</h2>
    
    <div style="display: flex; gap: 8px; margin-bottom: 15px;">
        <button id="btnFuncDiario" style="flex: 1; padding: 10px; background: #2a2a2a; color: #fff; border: 1px solid #444; border-radius: 6px; cursor: pointer; font-weight: bold;">Diário</button>
        <button id="btnFuncSemanal" style="flex: 1; padding: 10px; background: #2a2a2a; color: #fff; border: 1px solid #444; border-radius: 6px; cursor: pointer; font-weight: bold;">Semanal</button>
        <button id="btnFuncMensal" style="flex: 1; padding: 10px; background: #2a2a2a; color: #fff; border: 1px solid #444; border-radius: 6px; cursor: pointer; font-weight: bold;">Mensal</button>
    </div>
    
    <div style="background: #2a2a2a; padding: 12px; border-radius: 6px; text-align: center; margin-bottom: 15px;">
        <span style="font-size: 14px; color: #aaa; display: block;">Custo Total no Período</span>
        <strong id="custoTotalFuncionarios" style="font-size: 22px; color: #ff4444;">R$ 0.00</strong>
    </div>

    <div style="max-height: 250px; overflow-y: auto; background: #1a1a1a; border-radius: 6px; padding: 10px;">
        <table style="width: 100%; border-collapse: collapse; font-size: 13px; color: #fff;">
            <thead>
                <tr style="border-bottom: 1px solid #444; color: #ff9800; text-align: left;">
                    <th style="padding: 6px;">Funcionário</th>
                    <th style="padding: 6px;">O que consumiu</th>
                    <th style="padding: 6px; text-align: center;">Total Qtd</th>
                    <th style="padding: 6px; text-align: right;">Custo Acumulado</th>
                </tr>
            </thead>
            <tbody id="tabelaConsumoFunc">
                </tbody>
        </table>
    </div>
</div>

    </main>
    
    <script type="module" src="/server/dashBoard.js"></script>
</body>
</html>
